name: agrifarms-create-infra

on:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AGRI_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AGRI_AWS_SECRET_ACCESS_KEY }}

  TF_VAR_project: ${{ vars.AGRI_PROD_PROJECT }}
  TF_VAR_env: ${{ vars.AGRI_PROD_ENV }}
  TF_VAR_region: ${{ vars.AGRI_PROD_REGION }}
  TF_VAR_vpc_cidr: ${{ vars.AGRI_PROD_VPC_CIDR }}

  TF_VAR_db_username: ${{ secrets.AGRI_PROD_DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.AGRI_PROD_DB_PASSWORD }}

  TF_VAR_state_bucket_name: ${{ vars.AGRI_PROD_STATE_BUCKET_NAME }}
  TF_VAR_domain_name: ${{ vars.AGRI_PROD_DOMAIN_NAME }}
  TF_VAR_db_name: ${{ vars.AGRI_PROD_DB_NAME }}
  TF_VAR_repo_name: ${{ vars.AGRI_PROD_REPO_NAME }}

  TF_VAR_subject_alternative_names: ${{ vars.AGRI_PROD_SUBJECT_ALTERNATIVE_NAMES }}
  TF_VAR_route53_zone_id: ${{ vars.AGRI_PROD_ROUTE53_ZONE_ID }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Refresh State
        run: terraform apply -refresh-only -auto-approve      

      - name: Terraform Plan
        run: terraform plan -out=tfplan  

      - name: Terraform Apply
        run: terraform apply -auto-approve